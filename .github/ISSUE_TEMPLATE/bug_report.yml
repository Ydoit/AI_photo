name: 错误报告 (Bug Report)
description: 创建错误报告以帮助我们改进
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您反馈 Bug！请填写以下信息以帮助我们快速定位问题。
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰简洁地描述错误是什么。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 复现该行为的步骤。
      placeholder: |
        1. 能够访问 '...'
        2. 点击 '...'
        3. 滚动到 '...'
        4. 看到错误
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 清晰简洁地描述您期望发生的事情。
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生的事情。
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: 截图
      description: 如果适用，请添加屏幕截图以帮助解释您的问题。
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: 环境信息
      description: |
        例如：
        - OS: [e.g. Windows 11]
        - Browser [e.g. Chrome, Safari]
        - Version [e.g. 22]
      value: |
        - OS:
        - Browser:
        - Version:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志输出
      description: 如果适用，请复制并粘贴任何相关的日志输出。这将自动格式化为代码，因此无需使用反引号。
      render: shell
    validations:
      required: false
