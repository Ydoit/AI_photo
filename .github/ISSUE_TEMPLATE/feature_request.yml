name: 功能请求 (Feature Request)
description: 建议项目的新功能
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢您提出新功能建议！请尽量详细描述您的想法。
  - type: textarea
    id: problem
    attributes:
      label: 这个功能解决什么问题？
      description: 请描述该功能解决的痛点或需求。
      placeholder: 例如：我总是因为......而感到沮丧
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 您建议的解决方案是什么？
      description: 描述您期望的功能外观或行为。
      placeholder: 我希望能够......
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 您考虑过哪些替代方案？
      description: 描述您考虑过的任何替代解决方案或功能。
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: 其他上下文
      description: 在此处添加有关功能请求的任何其他上下文或截图。
    validations:
      required: false
