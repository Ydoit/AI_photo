name: Deploy Official Site

on:
  push:
    branches:
      - master
    paths:
      - 'package/official-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '构建文档')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'package/official-site/package-lock.json'

      - name: Install Dependencies
        working-directory: ./package/official-site
        run: npm install

      - name: Build VitePress Site
        working-directory: ./package/official-site
        run: npm run docs:build

      # ✅ 关键新增：上传构建产物为 github-pages 制品（官方强制要求）
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 指定要上传的产物目录（和你之前的publish_dir一致）
          path: ./package/official-site/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: contains(github.event.head_commit.message, '构建文档')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        # ✅ 关键删除：移除所有非法参数（publish_dir/force_orphan/github_token）
        # 新版官方Action无需这些参数，自动关联上传的制品+内置令牌