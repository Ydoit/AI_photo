name: Deploy Official Site

on:
  push:
    branches:
      - master
    paths:
      - 'package/official-site/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '构建文档')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: 'npm'
          # cache-dependency-path: 'package/official-site/package-lock.json'

      - name: Install Dependencies
        working-directory: ./package/official-site
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm ci

      - name: Build VitePress Site
        working-directory: ./package/official-site
        run: npm run docs:build

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./package/official-site/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: contains(github.event.head_commit.message, '构建文档')
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4