name: Build and Push AI

on:
  push:
    branches: [ "master" ]
    tags: [ "v*.*.*" ]
    paths:
      - 'package/ai/**'
      - '.github/workflows/docker-build-push-ai.yml'

jobs:
  build-and-push-ai:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '构建ai')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Determine image tags
        id: set-tags
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            BASE_TAG=${GITHUB_REF#refs/tags/v}
            EXTRA_TAGS="latest"
          else
            BASE_TAG=${GITHUB_REF#refs/heads/}
            EXTRA_TAGS=""
          fi
          echo "BASE_TAG=$BASE_TAG" >> $GITHUB_ENV
          echo "EXTRA_TAGS=$EXTRA_TAGS" >> $GITHUB_ENV
          echo "DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}" >> $GITHUB_ENV

      - name: Build and push ai
        uses: docker/build-push-action@v5
        with:
          context: ./package/ai
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKER_HUB_USERNAME }}/trailsnap-ai:${{ env.BASE_TAG }}
            ${{ env.EXTRA_TAGS != '' && format('{0}/trailsnap-ai:latest', env.DOCKER_HUB_USERNAME) || '' }}
