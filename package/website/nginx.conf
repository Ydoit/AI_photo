# 天地图瓦片资源缓存配置
proxy_cache_path /var/cache/nginx/tianditu levels=1:2 keys_zone=tianditu_cache:100m inactive=7d max_size=1g;

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 1000M;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 代理天地图瓦片请求并缓存
    location /tianditu-tiles/ {
        # 代理到天地图官方服务器，这里固定使用 t0 域名以简化缓存管理
        proxy_pass https://t0.tianditu.gov.cn/;
        
        # 启用缓存
        proxy_cache tianditu_cache;
        # 缓存 200 和 304 响应，有效期 7 天
        proxy_cache_valid 200 304 7d;
        # 缓存键：图层类型+x+y+层级（不包含 tk，因为 tk 是通用的）
        proxy_cache_key "$arg_T$arg_x$arg_y$arg_l";
        
        # 强制缓存，忽略天地图自身的缓存控制响应头
        proxy_ignore_headers Cache-Control Expires Set-Cookie;
        proxy_hide_header Set-Cookie;
        
        # 代理请求头设置
        proxy_set_header Host t0.tianditu.gov.cn;
        proxy_ssl_server_name on;
        
        # 允许跨域
        add_header Access-Control-Allow-Origin *;
        # 在响应头中增加缓存状态，方便调试 (HIT/MISS/BYPASS)
        add_header X-Cache-Status $upstream_cache_status;
        
        # 错误处理：如果后端出错，尝试使用过期的缓存
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    }

    # 代理API请求到后端服务（注意：后端服务名在Docker Compose中定义为server）
    location /api/ {
        proxy_pass http://server:8000/;  # 后端容器的地址和端口
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}