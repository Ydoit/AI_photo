<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="400" height="400">
  <!-- 背景层（浅灰色圆角矩形） -->


  <!-- 前景层（白色带边框圆角矩形） -->
  <rect
    x="10" y="15" width="80" height="75"
    rx="15" ry="15"
    fill="white"
    stroke="#2d2d2d"
    stroke-width="1"
  />

  <!-- 浅蓝色内容区域 -->
  <rect
    x="18" y="23" width="64" height="59"
    rx="8" ry="8"
    fill="#a8d1ff"
    stroke="#2d2d2d"
    stroke-width="1"
  />

  <!-- 太阳图案 -->
  <circle
    cx="35" cy="45" r="8"
    fill="white"
    stroke="#2d2d2d"
    stroke-width="2"
  />

  <!-- 山脉图案（大三角形） -->
  <polygon
    points="40,60 55,45 70,60"
    fill="white"
    stroke="#2d2d2d"
    stroke-width="2"
  />

  <!-- 山脉图案（小三角形） -->
  <polygon
    points="60,60 70,50 80,60"
    fill="white"
    stroke="#2d2d2d"
    stroke-width="2"
  />

  <!-- 横线装饰 -->
  <line
    x1="25" y1="65" x2="75" y2="65"
    stroke="#2d2d2d"
    stroke-width="2"
  />
  <line
    x1="25" y1="70" x2="75" y2="70"
    stroke="#2d2d2d"
    stroke-width="2"
  />
</svg>